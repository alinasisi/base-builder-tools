name: Daily Builder Report

on:
  schedule:
    - cron: '17 9 * * *'
    - cron: '17 11 * * *'
    - cron: '17 13 * * *'
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - name: Skip if already ran today
        id: check
        run: |
          TODAY=$(date +%Y-%m-%d)
          if [ -f "reports/${TODAY}.md" ]; then
            echo "already_ran=true" >> $GITHUB_OUTPUT
          else
            echo "already_ran=false" >> $GITHUB_OUTPUT
          fi
      - name: Random delay (schedule only)
        if: github.event_name == 'schedule' && steps.check.outputs.already_ran == 'false'
        run: sleep $((RANDOM % 1800))
      - name: Run bot
        if: steps.check.outputs.already_ran == 'false'
        run: node src/bot.js
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_USERNAME: alinasisi
          TALENT_WALLET: ${{ secrets.TALENT_WALLET }}
          GH_PAT: ${{ secrets.GH_PAT }}
      - name: Commit and push report
        if: steps.check.outputs.already_ran == 'false'
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config --global user.name "base-builder-bot"
          git config --global user.email "bot@base-builder-tools"
          git remote set-url origin "https://x-access-token:${GH_PAT}@github.com/alinasisi/base-builder-tools.git"
          mkdir -p reports
          git add reports/
          git diff --staged --quiet || git commit -m "report: daily builder metrics $(date +%Y-%m-%d)"
          git push origin main
      - name: Already ran today
        if: steps.check.outputs.already_ran == 'true'
        run: echo "Report already exists for today, skipping."
