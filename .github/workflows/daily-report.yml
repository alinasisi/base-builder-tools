name: Daily Builder Report

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: node src/bot.js
        env:
          GITHUB_USERNAME: alinasisi
          TALENT_WALLET: ${{ secrets.TALENT_WALLET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
      - name: Commit report
        run: |
          git config user.name "base-builder-bot"
          git config user.email "bot@base-builder-tools"
          git add reports/
          git diff --staged --quiet || git commit -m "report: daily builder metrics $(date +%Y-%m-%d)"
          git push
