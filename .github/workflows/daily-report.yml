name: Daily Builder Report

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - run: node src/bot.js
        env:
          GITHUB_USERNAME: alinasisi
          TALENT_WALLET: ${{ secrets.TALENT_WALLET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
      - name: Commit and push report
        run: |
          git config --global user.name "base-builder-bot"
          git config --global user.email "bot@base-builder-tools"
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/alinasisi/base-builder-tools.git
          mkdir -p reports
          git add reports/
          git status
          git diff --staged --quiet || git commit -m "report: daily builder metrics $(date +%Y-%m-%d)"
          git push origin main
